stages:
  - lint
  - quality
  - test
  - e2e
  
# -------------------------
# LINT + SAST (ESLint + npm audit)
# -------------------------
sast:
  stage: lint
  image: node:20
  script:
    - npm install -g eslint
    - npm audit --json > npm-audit.json || true
    - npx eslint . --ext .js -f json -o eslint-report.json || true
  artifacts:
    paths:
      - npm-audit.json
      - eslint-report.json
# -------------------------
# SONARCLOUD ANALYSIS
# -------------------------
variables:
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"  # Defines the location of the analysis task cache
  GIT_DEPTH: "0"  # Tells git to fetch all the branches of the project, required by the analysis task
sonarcloud-check:
  stage: quality
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - sonar-scanner
  only:
    - test

# -------------------------
# UNIT + INTEGRATION TESTS + COVERAGE
# -------------------------
unit_tests:
  stage: test
  image: node:20
  script:
    - npm ci
    - npm run test:unit -- --coverage
    - npm run test:integration -- --coverage
  artifacts:
    paths:
      - coverage/
      - test-results/s

# -------------------------
# BDD (Cucumber)
# -------------------------
bdd_tests:
  stage: test
  image: node:20
  script:
    - npm run test:bdd || true
  artifacts:
    reports:
      junit: test-results/**/*.xml

# -------------------------
# E2E (Playwright)
# -------------------------
e2e_tests:
  stage: e2e
  image: mcr.microsoft.com/playwright:v1.59.1-jammy
  script:
    - npm ci
    - npx playwright test
  artifacts:
    paths:
      - playwright-report/
      - test-results/


